<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>Ping Pong Game</h1>
            <div class="game-controls">
                <button id="startBtn">Start Game</button>
                <button id="pauseBtn">Pause</button>
                <button id="resetBtn">Reset</button>
                <select id="gameMode">
                    <option value="ai">vs Computer</option>
                    <option value="human">vs Human</option>
                </select>
            </div>
        </div>
        
        <div class="scoreboard">
            <div class="score">
                <span class="player-label">Player 1</span>
                <span id="player1Score">0</span>
            </div>
            <div class="score">
                <span class="player-label">Player 2</span>
                <span id="player2Score">0</span>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <div class="game-instructions">
            <h3>Controls:</h3>
            <p><strong>Player 1:</strong> W (Up) / S (Down)</p>
            <p><strong>Player 2:</strong> ↑ (Up) / ↓ (Down)</p>
            <p><strong>Game:</strong> Spacebar to start/pause</p>
        </div>
        
        <div class="game-info">
            <div id="gameStatus">Press Start to begin!</div>
            <div class="difficulty-settings">
                <label for="difficulty">AI Difficulty:</label>
                <select id="difficulty">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
